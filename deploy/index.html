<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="人工智能训练师三级理论知识刷题系统">
    <title>人工智能训练师三级 - 刷题系统</title>
    <style>
        /* ==================== CSS Reset & Base ==================== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #1a1a2e;
            --primary-light: #2d2d4a;
            --primary-dark: #0f0f1a;
            --accent: #f0a500;
            --accent-light: #ffd56b;
            --accent-glow: rgba(240, 165, 0, 0.35);
            --correct: #2ecc71;
            --correct-light: #eafaf1;
            --correct-border: #a3d9b1;
            --correct-glow: rgba(46, 204, 113, 0.35);
            --wrong: #e74c3c;
            --wrong-light: #fdf0ef;
            --wrong-border: #f0a8a0;
            --wrong-glow: rgba(231, 76, 60, 0.3);
            --bg: #f5f3f0;
            --bg-warm: #efeae4;
            --card-bg: #fffefa;
            --text-primary: #2d2d2d;
            --text-secondary: #5a5a5a;
            --text-hint: #9a9a9a;
            --border: #e0dcd6;
            --border-light: #ece8e2;
            --shadow: 0 1px 4px rgba(45, 45, 45, 0.06), 0 2px 8px rgba(45, 45, 45, 0.04);
            --shadow-hover: 0 4px 12px rgba(45, 45, 45, 0.1), 0 8px 24px rgba(45, 45, 45, 0.06);
            --shadow-float: 0 8px 24px rgba(45, 45, 45, 0.12), 0 16px 40px rgba(45, 45, 45, 0.06);
            --radius: 10px;
            --radius-sm: 6px;
            --btn-min-height: 48px;
            --font-serif: "Playfair Display", "Georgia", "Songti SC", "SimSun", "Noto Serif CJK SC", "Source Han Serif SC", "Times New Roman", serif;
            --font-body: "Source Han Serif SC", "Noto Serif CJK SC", "Songti SC", "SimSun", "Georgia", "Times New Roman", serif;
            --font-family: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-fast: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-elastic: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(240, 165, 0, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(26, 26, 46, 0.02) 0%, transparent 50%);
            color: var(--text-primary);
            line-height: 1.7;
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 70px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ==================== App Header ==================== */
        .app-header {
            background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #f5f3f0;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(26, 26, 46, 0.25);
            border-bottom: 2px solid var(--accent);
        }

        .app-header .header-title {
            font-family: var(--font-serif);
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .mode-badge {
            background: rgba(240, 165, 0, 0.15);
            color: var(--accent-light);
            padding: 4px 14px;
            border-radius: 20px;
            font-family: var(--font-family);
            font-size: 0.78rem;
            font-weight: 600;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(240, 165, 0, 0.3);
            letter-spacing: 0.3px;
        }

        /* ==================== Stats Bar ==================== */
        .stats-bar {
            padding: 16px 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1;
            min-width: 80px;
            background: var(--card-bg);
            border-radius: var(--radius-sm);
            padding: 14px 8px 12px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-light);
            position: relative;
            overflow: hidden;
        }

        .stat-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            right: 20%;
            height: 2px;
            background: var(--accent);
            border-radius: 1px;
            opacity: 0.6;
        }

        .stat-card .stat-value {
            font-family: var(--font-serif);
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            line-height: 1.2;
        }

        .stat-card .stat-label {
            font-family: var(--font-family);
            font-size: 0.72rem;
            color: var(--text-hint);
            margin-top: 4px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .stat-card.correct .stat-value {
            color: var(--correct);
        }

        .stat-card.correct::after {
            background: var(--correct);
        }

        .stat-card.wrong .stat-value {
            color: var(--wrong);
        }

        .stat-card.wrong::after {
            background: var(--wrong);
        }

        /* Progress Bar */
        .progress-wrapper {
            padding: 0 20px 14px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            border-radius: 2px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            width: 0%;
            position: relative;
        }

        .progress-bar-fill::after {
            content: '';
            position: absolute;
            right: 0;
            top: -2px;
            bottom: -2px;
            width: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-glow);
        }

        /* ==================== Question Container ==================== */
        .question-container {
            padding: 0 20px 20px;
            animation: staggerFadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) both;
        }

        .question-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-light);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .question-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent), var(--primary));
            opacity: 0.8;
        }

        .question-number {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--primary);
            color: var(--accent-light);
            padding: 3px 12px;
            border-radius: 12px;
            font-family: var(--font-family);
            font-size: 0.78rem;
            font-weight: 700;
            margin-bottom: 14px;
            letter-spacing: 0.3px;
            border: 1px solid rgba(240, 165, 0, 0.2);
        }

        .question-text {
            font-family: var(--font-body);
            font-size: 1.05rem;
            line-height: 1.9;
            color: var(--text-primary);
            margin-bottom: 20px;
            font-weight: 500;
            letter-spacing: 0.2px;
        }

        /* Answer Buttons */
        .answer-buttons {
            display: flex;
            gap: 12px;
        }

        .answer-btn {
            flex: 1;
            min-height: var(--btn-min-height);
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--card-bg);
            font-size: 1rem;
            font-weight: 600;
            font-family: var(--font-family);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            overflow: hidden;
        }

        .answer-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: currentColor;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .answer-btn:hover::before {
            opacity: 0.04;
        }

        .answer-btn:active {
            transform: scale(0.97);
        }

        .answer-btn.btn-true {
            color: var(--correct);
            border-color: var(--correct-border);
        }

        .answer-btn.btn-true:hover,
        .answer-btn.btn-true:active {
            background: var(--correct-light);
        }

        .answer-btn.btn-false {
            color: var(--wrong);
            border-color: var(--wrong-border);
        }

        .answer-btn.btn-false:hover,
        .answer-btn.btn-false:active {
            background: var(--wrong-light);
        }

        .answer-btn.selected-correct {
            background: var(--correct) !important;
            color: #FFFFFF !important;
            border-color: var(--correct) !important;
            box-shadow: 0 0 0 3px var(--correct-glow), var(--shadow-hover);
            animation: correctGlow 0.6s ease;
        }

        .answer-btn.selected-wrong {
            background: var(--wrong) !important;
            color: #FFFFFF !important;
            border-color: var(--wrong) !important;
            box-shadow: 0 0 0 3px var(--wrong-glow);
            animation: wrongShake 0.5s ease;
        }

        .answer-btn:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .answer-btn:disabled:hover {
            background: var(--card-bg);
        }

        .answer-btn:disabled:hover::before {
            opacity: 0;
        }

        .answer-btn.correct-answer-highlight {
            background: var(--correct-light) !important;
            border-color: var(--correct) !important;
            color: var(--correct) !important;
            opacity: 1 !important;
            box-shadow: 0 0 0 2px var(--correct-glow);
        }

        /* ==================== Feedback Container ==================== */
        .feedback-container {
            padding: 0 20px 16px;
            display: none;
            overflow: hidden;
        }

        .feedback-container.visible {
            display: block;
            animation: pageTurnIn 0.45s cubic-bezier(0.4, 0, 0.2, 1) both;
        }

        .feedback-box {
            border-radius: var(--radius);
            padding: 18px 20px;
            font-size: 0.9rem;
            line-height: 1.7;
            position: relative;
        }

        .feedback-box.feedback-correct {
            background: linear-gradient(135deg, var(--correct-light), #d5f5e3);
            border: 1px solid var(--correct-border);
            color: #1a6b37;
            box-shadow: 0 2px 8px var(--correct-glow);
        }

        .feedback-box.feedback-correct::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            width: 4px;
            background: var(--correct);
            border-radius: 4px 0 0 4px;
        }

        .feedback-box.feedback-wrong {
            background: linear-gradient(135deg, var(--wrong-light), #fce4e4);
            border: 1px solid var(--wrong-border);
            color: #8b2020;
            box-shadow: 0 2px 8px var(--wrong-glow);
        }

        .feedback-box.feedback-wrong::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            width: 4px;
            background: var(--wrong);
            border-radius: 4px 0 0 4px;
        }

        .feedback-box .feedback-title {
            font-family: var(--font-family);
            font-weight: 700;
            margin-bottom: 6px;
            font-size: 0.95rem;
            letter-spacing: 0.2px;
        }

        .feedback-box .feedback-explanation {
            font-family: var(--font-body);
            font-size: 0.88rem;
            color: var(--text-secondary);
            line-height: 1.8;
        }

        /* ==================== Navigation Bar ==================== */
        .navigation-bar {
            padding: 0 20px 20px;
            display: flex;
            gap: 12px;
        }

        .nav-btn {
            flex: 1;
            min-height: var(--btn-min-height);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--card-bg);
            color: var(--primary);
            font-size: 0.95rem;
            font-weight: 600;
            font-family: var(--font-family);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            -webkit-tap-highlight-color: transparent;
            letter-spacing: 0.3px;
        }

        .nav-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .nav-btn:active {
            transform: scale(0.97);
        }

        .nav-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .nav-btn:disabled:hover {
            border-color: var(--border);
            color: var(--primary);
        }

        .nav-btn:disabled:active {
            transform: none;
        }

        .nav-btn.primary-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: var(--accent-light);
            border-color: var(--primary);
        }

        .nav-btn.primary-btn:hover {
            box-shadow: 0 4px 12px rgba(26, 26, 46, 0.3);
        }

        /* ==================== Bottom Bar ==================== */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-top: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
            box-shadow: 0 -4px 16px rgba(45, 45, 45, 0.06);
            backdrop-filter: blur(10px);
        }

        .bottom-btn {
            flex: 1;
            min-height: 44px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--card-bg);
            color: var(--text-secondary);
            font-size: 0.82rem;
            font-weight: 500;
            font-family: var(--font-family);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            -webkit-tap-highlight-color: transparent;
            letter-spacing: 0.2px;
        }

        .bottom-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .bottom-btn:active {
            transform: scale(0.97);
            background: var(--bg-warm);
        }

        .bottom-btn .btn-icon {
            font-size: 1.05rem;
        }

        /* ==================== Modal Overlay ==================== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(26, 26, 46, 0.55);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            align-items: flex-end;
            justify-content: center;
            animation: fadeIn 0.25s ease;
        }

        .modal-overlay.visible {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 16px 16px 0 0;
            width: 100%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            animation: slideUp 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            border-top: 3px solid var(--accent);
        }

        .modal-header {
            position: sticky;
            top: 0;
            background: var(--card-bg);
            padding: 20px 20px 14px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        .modal-header .modal-title {
            font-family: var(--font-serif);
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 0.3px;
        }

        .modal-close-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--bg);
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: var(--transition);
        }

        .modal-close-btn:hover {
            background: var(--border);
            color: var(--wrong);
        }

        .modal-body {
            padding: 20px;
        }

        /* Wrong Book Items */
        .wrong-book-empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-hint);
        }

        .wrong-book-empty .empty-icon {
            font-size: 3rem;
            margin-bottom: 12px;
            opacity: 0.6;
        }

        .wrong-book-empty .empty-text {
            font-family: var(--font-body);
            font-size: 0.95rem;
        }

        .wrong-book-item {
            background: var(--bg);
            border-radius: var(--radius-sm);
            padding: 16px;
            margin-bottom: 12px;
            border-left: 3px solid var(--wrong);
            transition: var(--transition);
            cursor: pointer;
        }

        .wrong-book-item:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-1px);
        }

        .wrong-book-item:active {
            background: var(--border);
            transform: translateY(0);
        }

        .wrong-book-item .wb-question {
            font-family: var(--font-body);
            font-size: 0.9rem;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.6;
        }

        .wrong-book-item .wb-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: var(--font-family);
            font-size: 0.78rem;
            color: var(--text-hint);
        }

        .wrong-book-item .wb-answer {
            font-weight: 700;
        }

        .wrong-book-item .wb-answer.correct {
            color: var(--correct);
        }

        .wrong-book-item .wb-answer.wrong {
            color: var(--wrong);
        }

        /* Question List Modal */
        .question-list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .question-list-title {
            font-family: var(--font-serif);
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 0.3px;
        }

        .question-list-count {
            font-family: var(--font-family);
            font-size: 0.82rem;
            color: var(--text-hint);
            background: var(--bg);
            padding: 4px 10px;
            border-radius: 12px;
        }

        .question-list-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .question-list-tab {
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: var(--card-bg);
            font-family: var(--font-family);
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .question-list-tab:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .question-list-tab.active {
            background: var(--primary);
            color: var(--accent-light);
            border-color: var(--primary);
        }

        .question-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(42px, 1fr));
            gap: 8px;
            max-height: 60vh;
            overflow-y: auto;
            padding: 4px;
        }

        .question-grid-item {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--card-bg);
            font-family: var(--font-family);
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-primary);
            cursor: pointer;
            transition: var(--transition-fast);
            position: relative;
        }

        .question-grid-item:hover {
            border-color: var(--accent);
            transform: scale(1.05);
            box-shadow: var(--shadow-hover);
        }

        .question-grid-item:active {
            transform: scale(0.95);
        }

        .question-grid-item.current {
            border-color: var(--accent);
            border-width: 3px;
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .question-grid-item.correct {
            background: var(--correct-light);
            border-color: var(--correct-border);
            color: var(--correct);
        }

        .question-grid-item.wrong {
            background: var(--wrong-light);
            border-color: var(--wrong-border);
            color: var(--wrong);
        }

        .question-grid-item .item-status {
            position: absolute;
            top: 2px;
            right: 2px;
            font-size: 0.6rem;
            line-height: 1;
        }

        /* Completion Summary */
        .completion-summary {
            text-align: center;
            padding: 10px 0 20px;
        }

        .completion-summary .summary-icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }

        .completion-summary .summary-title {
            font-family: var(--font-serif);
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .completion-summary .summary-subtitle {
            font-family: var(--font-body);
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .completion-summary .summary-stats {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 24px;
        }

        .completion-summary .summary-stat-item {
            text-align: center;
        }

        .completion-summary .summary-stat-value {
            font-family: var(--font-serif);
            font-size: 2rem;
            font-weight: 800;
            line-height: 1.2;
        }

        .completion-summary .summary-stat-label {
            font-family: var(--font-family);
            font-size: 0.78rem;
            color: var(--text-hint);
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .completion-summary .summary-stat-item.correct .summary-stat-value {
            color: var(--correct);
        }

        .completion-summary .summary-stat-item.wrong .summary-stat-value {
            color: var(--wrong);
        }

        .completion-summary .summary-stat-item.total .summary-stat-value {
            color: var(--primary);
        }

        .completion-summary .summary-accuracy {
            font-family: var(--font-serif);
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .completion-summary .summary-accuracy-label {
            font-family: var(--font-family);
            font-size: 0.85rem;
            color: var(--text-hint);
            margin-bottom: 24px;
            letter-spacing: 0.3px;
        }

        .completion-btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .completion-btn {
            min-height: var(--btn-min-height);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font-family);
            -webkit-tap-highlight-color: transparent;
        }

        .completion-btn:active {
            transform: scale(0.97);
        }

        .completion-btn.btn-retry {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: var(--accent-light);
        }

        .completion-btn.btn-wrong-book {
            background: var(--bg);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        /* ==================== Toast Notifications ==================== */
        .toast-container {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }

        .toast {
            background: rgba(26, 26, 46, 0.88);
            color: #f5f3f0;
            padding: 10px 22px;
            border-radius: 8px;
            font-family: var(--font-family);
            font-size: 0.85rem;
            font-weight: 500;
            box-shadow: 0 4px 16px rgba(26, 26, 46, 0.25);
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2s forwards;
            white-space: nowrap;
            max-width: 85vw;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.2px;
            border: 1px solid rgba(240, 165, 0, 0.2);
        }

        /* ==================== Animations ==================== */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes staggerFadeIn {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }

        @keyframes pageTurnIn {
            0% {
                opacity: 0;
                transform: translateY(30px) rotateX(8deg);
                transform-origin: bottom center;
            }
            60% {
                opacity: 1;
                transform: translateY(-4px) rotateX(-1deg);
            }
            100% {
                opacity: 1;
                transform: translateY(0) rotateX(0deg);
            }
        }

        @keyframes correctGlow {
            0% {
                box-shadow: 0 0 0 0 var(--correct-glow);
            }
            50% {
                box-shadow: 0 0 0 8px var(--correct-glow), 0 0 20px var(--correct-glow);
            }
            100% {
                box-shadow: 0 0 0 3px var(--correct-glow), var(--shadow-hover);
            }
        }

        @keyframes wrongShake {
            0%, 100% {
                transform: translateX(0);
            }
            10%, 50%, 90% {
                transform: translateX(-4px);
            }
            30%, 70% {
                transform: translateX(4px);
            }
        }

        @keyframes elasticPop {
            0% {
                transform: scale(1);
            }
            40% {
                transform: scale(1.12);
            }
            70% {
                transform: scale(0.95);
            }
            100% {
                transform: scale(1);
            }
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(-16px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            to {
                opacity: 0;
                transform: translateY(-16px) scale(0.96);
            }
        }

            <!-- Modal content will be dynamically injected -->

    <script>
    "use strict";
    /* ==================================================================
       QUESTION DATA - loaded from questions.json
       ================================================================== */
    let QUESTIONS = [];

    async function loadQuestions() {
        const resp = await fetch('questions.json');
        QUESTIONS = await resp.json();
    }



    /* ==================================================================
       MODULE PLACEHOLDERS
       These IIFE modules will be implemented in subsequent tasks.
       ================================================================== */

    /* ------- Storage Module (Task 2) ------- */
    const Storage = (function() {
        const KEYS = {
            progress: 'quiz_progress',
            history: 'quiz_history',
            wrong: 'quiz_wrong'
        };

        function _get(key) {
            try {
                const raw = localStorage.getItem(key);
                return raw ? JSON.parse(raw) : null;
            } catch (e) {
                return null;
            }
        }

        function _set(key, value) {
            try {
                localStorage.setItem(key, JSON.stringify(value));
            } catch (e) {
                // Silently fail if localStorage is unavailable
            }
        }

        return {
            saveProgress(progress) {
                _set(KEYS.progress, progress);
            },

            loadProgress() {
                return _get(KEYS.progress);
            },

            saveHistory(record) {
                const history = _get(KEYS.history) || [];
                history.push(record);
                _set(KEYS.history, history);
            },

            loadHistory() {
                return _get(KEYS.history) || [];
            },

            saveWrong(questionId) {
                const list = _get(KEYS.wrong) || [];
                if (!list.includes(questionId)) {
                    list.push(questionId);
                    _set(KEYS.wrong, list);
                }
            },

            removeWrong(questionId) {
                const list = _get(KEYS.wrong) || [];
                const index = list.indexOf(questionId);
                if (index !== -1) {
                    list.splice(index, 1);
                    _set(KEYS.wrong, list);
                }
            },

            getWrongList() {
                return _get(KEYS.wrong) || [];
            },

            clearAll() {
                try {
                    localStorage.removeItem(KEYS.progress);
                    localStorage.removeItem(KEYS.history);
                    localStorage.removeItem(KEYS.wrong);
                } catch (e) {
                    // Silently fail if localStorage is unavailable
                }
            }
        };
    })();

    /*
     * ------- Sync Module (Firebase Realtime Database) -------
     *
     * Uses a shared "sync code" (6-char alphanumeric) instead of anonymous UID
     * so that multiple devices with the same sync code read/write to the same
     * Firebase path: /groups/{syncCode}/
     *
     * Firebase Realtime Database rules should allow authenticated users to
     * read/write under /groups/:
     * {
     *   "rules": {
     *     "groups": {
     *       "$code": {
     *         ".read": "auth != null",
     *         ".write": "auth != null"
     *       }
     *     }
     *   }
     * }
     */
    const Sync = (function() {
        var app = null;
        var auth = null;
        var db = null;
        var uid = null;
        var syncCode = null;
        var connected = false;
        var syncing = false;
        var saveTimer = null;
        var initialized = false;

        // Characters used for sync code generation (no ambiguous chars: 0/O, 1/I/L)
        var SYNC_CHARS = '23456789ABCDEFGHJKMNPQRSTUVWXYZ';
        var SYNC_CODE_KEY = 'quiz_sync_code';

        function generateSyncCode() {
            var code = '';
            for (var i = 0; i < 6; i++) {
                code += SYNC_CHARS.charAt(Math.floor(Math.random() * SYNC_CHARS.length));
            }
            return code;
        }

        function getSyncCode() {
            return localStorage.getItem(SYNC_CODE_KEY) || '';
        }

        function setSyncCode(code) {
            syncCode = code.toUpperCase();
            localStorage.setItem(SYNC_CODE_KEY, syncCode);
            updateStatusUI();
            // Reload data from the new group path - force cloud data when switching codes
            if (initialized && db) {
                Sync.loadFromCloud(true);
            }
        }

        function validateSyncCode(code) {
            if (!code || typeof code !== 'string') return false;
            var normalized = code.toUpperCase().trim();
            if (normalized.length !== 6) return false;
            for (var i = 0; i < normalized.length; i++) {
                if (SYNC_CHARS.indexOf(normalized[i]) === -1) return false;
            }
            return true;
        }

        function joinSyncCode(code) {
            if (!validateSyncCode(code)) {
                return { ok: false, error: '同步码格式不正确（需要6位字母数字）' };
            }
            setSyncCode(code.toUpperCase().trim());
            return { ok: true };
        }

        function getDataPath() {
            if (!syncCode) return null;
            return '/groups/' + syncCode;
        }

        function updateStatusUI() {
            var el = document.getElementById('syncStatus');
            if (!el) return;
            var dot = el.querySelector('.sync-dot');
            var text = el.querySelector('.sync-text');
            if (!dot || !text) return;

            if (!initialized) {
                dot.className = 'sync-dot offline';
                text.textContent = '离线模式';
            } else if (syncing) {
                dot.className = 'sync-dot syncing';
                text.textContent = '同步中...';
            } else if (connected) {
                dot.className = 'sync-dot online';
                text.textContent = '已同步';
            } else {
                dot.className = 'sync-dot offline';
                text.textContent = '离线模式';
            }

            // Show sync code in UI
            var displayEl = document.getElementById('syncCodeDisplay');
            var codeTextEl = document.getElementById('syncCodeText');
            if (displayEl && codeTextEl && syncCode) {
                displayEl.style.display = 'inline-flex';
                codeTextEl.textContent = syncCode;
            }
        }

        function getLocalData() {
            var stored = localStorage.getItem('quiz_last_modified');
            return {
                progress: Storage.loadProgress(),
                wrong: Storage.getWrongList(),
                history: Storage.loadHistory(),
                lastModified: stored || new Date().toISOString()
            };
        }

        function markLocalModified() {
            var now = new Date().toISOString();
            localStorage.setItem('quiz_last_modified', now);
            return now;
        }

        function applyCloudData(data) {
            if (data.progress) {
                localStorage.setItem('quiz_progress', JSON.stringify(data.progress));
            }
            if (data.wrong) {
                localStorage.setItem('quiz_wrong', JSON.stringify(data.wrong));
            }
            if (data.history) {
                localStorage.setItem('quiz_history', JSON.stringify(data.history));
            }
            if (data.lastModified) {
                localStorage.setItem('quiz_last_modified', data.lastModified);
            }
        }

        function showSyncDialog() {
            var overlay = document.getElementById('modalOverlay');
            var content = document.getElementById('modalContent');
            if (!overlay || !content) return;

            var currentCode = syncCode || '';

            var html = '<div class="modal-header">' +
                '<h2 class="modal-title">设备同步</h2>' +
                '<button class="modal-close-btn" id="syncDialogCloseBtn">&times;</button>' +
                '</div><div class="modal-body">' +
                '<div class="sync-current-section">' +
                '<div class="sync-current-label">当前同步码</div>' +
                '<div class="sync-current-code">' + currentCode + '</div>' +
                '<br><button class="sync-copy-btn" id="syncCopyBtn">复制同步码</button>' +
                '</div>' +
                '<hr class="sync-divider">' +
                '<div class="sync-join-section">' +
                '<div class="sync-join-label">输入另一设备的同步码进行连接</div>' +
                '<div class="sync-join-input-row">' +
                '<input type="text" class="sync-join-input" id="syncJoinInput" maxlength="6" placeholder="输入6位同步码" autocomplete="off" spellcheck="false">' +
                '<button class="sync-join-btn" id="syncJoinBtn">连接</button>' +
                '</div>' +
                '<div class="sync-feedback" id="syncFeedback"></div>' +
                '</div>' +
                '</div>';

            content.innerHTML = html;
            content.className = 'modal-content sync-dialog';
            overlay.classList.add('visible');

            // Bind close
            document.getElementById('syncDialogCloseBtn').addEventListener('click', function() {
                overlay.classList.remove('visible');
            });

            // Bind copy
            document.getElementById('syncCopyBtn').addEventListener('click', function() {
                var btn = this;
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(currentCode).then(function() {
                        btn.textContent = '已复制';
                        btn.classList.add('copied');
                        setTimeout(function() {
                            btn.textContent = '复制同步码';
                            btn.classList.remove('copied');
                        }, 2000);
                    }).catch(function() {
                        fallbackCopy(currentCode, btn);
                    });
                } else {
                    fallbackCopy(currentCode, btn);
                }
            });

            // Bind join input - auto-uppercase
            var joinInput = document.getElementById('syncJoinInput');
            joinInput.addEventListener('input', function() {
                this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            });

            // Bind join button
            document.getElementById('syncJoinBtn').addEventListener('click', function() {
                var code = joinInput.value.trim();
                var feedback = document.getElementById('syncFeedback');
                var result = joinSyncCode(code);
                if (result.ok) {
                    feedback.className = 'sync-feedback success';
                    feedback.textContent = '已切换到同步码: ' + syncCode;
                    // Update displayed code
                    document.querySelector('.sync-current-code').textContent = syncCode;
                    joinInput.value = '';
                } else {
                    feedback.className = 'sync-feedback error';
                    feedback.textContent = result.error;
                }
            });

            // Enter key on input
            joinInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    document.getElementById('syncJoinBtn').click();
                }
            });

            // Focus input
            joinInput.focus();
        }

        function fallbackCopy(text, btn) {
            var ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            try {
                document.execCommand('copy');
                btn.textContent = '已复制';
                btn.classList.add('copied');
                setTimeout(function() {
                    btn.textContent = '复制同步码';
                    btn.classList.remove('copied');
                }, 2000);
            } catch (e) {
                btn.textContent = '复制失败';
                setTimeout(function() {
                    btn.textContent = '复制同步码';
                }, 2000);
            }
            document.body.removeChild(ta);
        }

        return {
            init: function() {
                try {
                    if (!firebase.apps.length) {
                        app = firebase.initializeApp({
                            apiKey: "AIzaSyD4lbUsQFn496u8Hv6crhYvk_7paL47hLI",
                            authDomain: "ai-trainer-quiz-2777d.firebaseapp.com",
                            databaseURL: "https://ai-trainer-quiz-2777d-default-rtdb.asia-southeast1.firebasedatabase.app",
                            projectId: "ai-trainer-quiz-2777d",
                            storageBucket: "ai-trainer-quiz-2777d.firebasestorage.app",
                            messagingSenderId: "1017229865832",
                            appId: "1:1017229865832:web:075581ba26ac97ec2adcdd"
                        });
                    } else {
                        app = firebase.app();
                    }
                    auth = firebase.auth();
                    db = firebase.database();

                    // Connection status listener
                    db.ref('.info/connected').on('value', function(snap) {
                        connected = snap.val() === true;
                        updateStatusUI();
                    });

                    // Check for existing sync code or generate a new one
                    syncCode = getSyncCode();
                    if (!syncCode) {
                        syncCode = generateSyncCode();
                        localStorage.setItem(SYNC_CODE_KEY, syncCode);
                    }

                    // Sign in anonymously (needed for database rules)
                    auth.signInAnonymously().then(function() {
                        uid = auth.currentUser.uid;
                        initialized = true;
                        updateStatusUI();
                        Sync.loadFromCloud();
                    }).catch(function(err) {
                        console.warn('Firebase anonymous auth failed:', err);
                        updateStatusUI();
                    });

                    // Bind sync switch button
                    var switchBtn = document.getElementById('syncSwitchBtn');
                    if (switchBtn) {
                        switchBtn.addEventListener('click', function(e) {
                            e.stopPropagation();
                            showSyncDialog();
                        });
                    }
                } catch (err) {
                    console.warn('Firebase init failed:', err);
                    updateStatusUI();
                }
            },

            loadFromCloud: function(forceCloud) {
                if (!db || !uid || !syncCode) return;
                var path = getDataPath();
                if (!path) return;

                try {
                    syncing = true;
                    updateStatusUI();

                    db.ref(path).once('value').then(function(snap) {
                        syncing = false;
                        var cloudData = snap.val();
                        var localData = getLocalData();
                        var localProgress = localData.progress;

                        if (cloudData && cloudData.progress) {
                            var cloudTime = cloudData.lastModified || '';
                            var localTime = localData.lastModified || '';

                            // Use cloud if: forced, cloud is newer, or local has no real data
                            var localHasData = localProgress && localProgress.totalAnswered > 0;
                            if (forceCloud || cloudTime > localTime || !localHasData) {
                                applyCloudData(cloudData);
                                State.init();
                                UI.render();
                            } else {
                                Sync.saveToCloud(true);
                            }
                        } else if (localProgress && localProgress.totalAnswered > 0) {
                            // No cloud data but local has real data - push to cloud
                            Sync.saveToCloud(true);
                        }
                        updateStatusUI();
                    }).catch(function(err) {
                        syncing = false;
                        console.warn('Firebase read failed:', err);
                        UI.showToast('同步失败: ' + (err.message || '网络错误'), 'error');
                        updateStatusUI();
                    });
                } catch (err) {
                    syncing = false;
                    console.warn('loadFromCloud failed:', err);
                    UI.showToast('同步初始化失败', 'error');
                    updateStatusUI();
                }
            },

            saveToCloud: function(immediate) {
                if (!db || !uid || !syncCode) return;
                var path = getDataPath();
                if (!path) return;

                if (saveTimer) {
                    clearTimeout(saveTimer);
                    saveTimer = null;
                }

                function doSave() {
                    try {
                        syncing = true;
                        updateStatusUI();
                        var data = getLocalData();
                        data.lastModified = markLocalModified();
                        db.ref(path).set(data).then(function() {
                            syncing = false;
                            updateStatusUI();
                        }).catch(function(err) {
                            syncing = false;
                            console.warn('Firebase write failed:', err);
                            UI.showToast('同步写入失败: ' + (err.message || '权限不足'), 'error');
                            updateStatusUI();
                        });
                    } catch (err) {
                        syncing = false;
                        console.warn('saveToCloud failed:', err);
                        updateStatusUI();
                    }
                }

                if (immediate) {
                    doSave();
                } else {
                    saveTimer = setTimeout(doSave, 500);
                }
            },

            isConnected: function() {
                return connected;
            },

            getStatus: function() {
                if (!initialized) return 'offline';
                if (syncing) return 'syncing';
                if (connected) return 'synced';
                return 'offline';
            },

            getUid: function() {
                return uid;
            },

            getSyncCode: function() {
                return syncCode;
            },

            setSyncCode: function(code) {
                setSyncCode(code);
            },

            joinSyncCode: function(code) {
                return joinSyncCode(code);
            },

            generateSyncCode: function() {
                return generateSyncCode();
            },

            showSyncDialog: function() {
                showSyncDialog();
            }
        };
    })();

    /* ------- State Module (Task 2) ------- */
    const State = (function() {
        let current = null;
        let category = 'all';

        function createDefault() {
            return {
                mode: 'sequential',
                currentIndex: 0,
                order: Array.from({length: QUESTIONS.length}, (_, i) => i),
                answered: {},
                score: 0,
                totalAnswered: 0,
                startTime: new Date().toISOString(),
                completed: false,
                categoryIndex: {}
            };
        }

        function shuffleOrder(order) {
            const arr = [...order];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function getQuestionsByCategory(cat) {
            if (cat === 'all') return QUESTIONS;
            return QUESTIONS.filter(function(q) { return q.type === cat; });
        }

        function getFilteredIndices(cat) {
            if (cat === 'wrong') {
                return Storage.getWrongList().slice();
            }
            var indices = [];
            for (var i = 0; i < QUESTIONS.length; i++) {
                if (cat === 'all' || QUESTIONS[i].type === cat) {
                    indices.push(i);
                }
            }
            return indices;
        }

        return {
            init() {
                const saved = Storage.loadProgress();
                if (saved && typeof saved.currentIndex === 'number' && Array.isArray(saved.order)) {
                    current = Object.assign(createDefault(), saved);
                } else {
                    current = createDefault();
                }
            },

            getCurrent() {
                if (!current) this.init();
                return current;
            },

            getCategory() {
                return category;
            },

            setCategory(cat) {
                if (!current) this.init();
                // 保存当前分类的进度索引
                if (!current.categoryIndex) current.categoryIndex = {};
                current.categoryIndex[category] = current.currentIndex;

                category = cat;
                var indices = getFilteredIndices(cat);
                if (current.mode === 'random') {
                    indices = shuffleOrder(indices);
                }
                current.order = indices;
                // 恢复目标分类的进度索引（如果有）
                var savedIndex = current.categoryIndex[cat];
                if (savedIndex !== undefined && savedIndex < indices.length) {
                    current.currentIndex = savedIndex;
                } else {
                    current.currentIndex = 0;
                }
                Storage.saveProgress(current);
                if (typeof Sync !== 'undefined' && Sync.saveToCloud) Sync.saveToCloud();
            },

            setMode(mode) {
                if (!current) this.init();
                var indices = getFilteredIndices(category);
                if (mode === 'sequential') {
                    current.mode = 'sequential';
                    current.order = indices;
                } else if (mode === 'random') {
                    current.mode = 'random';
                    current.order = shuffleOrder(indices);
                }
                current.currentIndex = 0;
                Storage.saveProgress(current);
                if (typeof Sync !== 'undefined' && Sync.saveToCloud) Sync.saveToCloud();
            },

            getCurrentQuestion() {
                if (!current) this.init();
                const idx = current.order[current.currentIndex];
                return QUESTIONS[idx] || null;
            },

            getFilteredQuestions() {
                return getQuestionsByCategory(category);
            },

            getCurrentQuestionIndex() {
                if (!current) this.init();
                return current.order[current.currentIndex];
            },

            answerQuestion(userAnswer) {
                if (!current) this.init();
                const question = this.getCurrentQuestion();
                const qIndex = current.order[current.currentIndex];

                if (current.answered[qIndex] !== undefined) {
                    return current.answered[qIndex] === question.answer;
                }

                const isCorrect = (userAnswer === question.answer);

                current.answered[qIndex] = userAnswer;
                current.totalAnswered++;

                if (isCorrect) {
                    current.score++;
                    Storage.removeWrong(qIndex);
                } else {
                    Storage.saveWrong(qIndex);
                }

                Storage.saveHistory({
                    questionIndex: qIndex,
                    userAnswer: userAnswer,
                    correctAnswer: question.answer,
                    isCorrect: isCorrect,
                    timestamp: new Date().toISOString()
                });

                Storage.saveProgress(current);
                if (typeof Sync !== 'undefined' && Sync.saveToCloud) Sync.saveToCloud();
                return isCorrect;
            },

            goNext() {
                if (!current) this.init();
                if (this.canGoNext()) {
                    current.currentIndex++;
                    Storage.saveProgress(current);
                    if (typeof Sync !== 'undefined' && Sync.saveToCloud) Sync.saveToCloud();
                }
            },

            goPrev() {
                if (!current) this.init();
                if (this.canGoPrev()) {
                    current.currentIndex--;
                    Storage.saveProgress(current);
                    if (typeof Sync !== 'undefined' && Sync.saveToCloud) Sync.saveToCloud();
                }
            },

            canGoNext() {
                if (!current) this.init();
                return current.currentIndex < current.order.length - 1;
            },

            canGoPrev() {
                if (!current) this.init();
                return current.currentIndex > 0;
            },

            isAnswered(qIndex) {
                if (!current) this.init();
                return current.answered.hasOwnProperty(qIndex);
            },

            getAnswer(qIndex) {
                if (!current) this.init();
                return current.answered[qIndex];
            },

            reset() {
                if (!current) this.init();
                Storage.clearAll();
                current = createDefault();
                category = 'all';
                Storage.saveProgress(current);
                if (typeof Sync !== 'undefined' && Sync.saveToCloud) Sync.saveToCloud();
            }
        };
    })();

    /* ------- UI Module (Task 3) ------- */
    const UI = (function() {
        return {
            render() {
                this.renderStats();
                this.renderCategoryTabs();
                var question = State.getCurrentQuestion();
                if (!question) {
                    if (State.getCategory() === 'wrong') {
                        document.getElementById('questionText').textContent = '暂无错题，继续保持！';
                        document.getElementById('judgeButtons').style.display = 'none';
                        document.getElementById('choiceOptions').style.display = 'none';
                        document.getElementById('btnSubmit').style.display = 'none';
                    } else {
                        document.getElementById('questionText').textContent = '题目加载失败，请刷新页面重试。';
                    }
                    document.getElementById('feedbackContainer').classList.remove('visible');
                    this.renderNavigation();
                    return;
                }
                var qIndex = State.getCurrentQuestionIndex();
                this.renderQuestion(question, qIndex);
                if (State.isAnswered(qIndex)) {
                    var userAnswer = State.getAnswer(qIndex);
                    var isCorrect = (userAnswer === question.answer);
                    this.renderFeedback(question, userAnswer, isCorrect);
                } else {
                    document.getElementById('feedbackContainer').classList.remove('visible');
                }
                this.renderNavigation();
            },

            renderCategoryTabs() {
                var currentCat = State.getCategory();
                var tabs = document.querySelectorAll('.cat-tab');
                for (var i = 0; i < tabs.length; i++) {
                    var cat = tabs[i].getAttribute('data-category');
                    if (cat === currentCat) {
                        tabs[i].classList.add('active');
                    } else {
                        tabs[i].classList.remove('active');
                    }
                }
            },

            renderStats() {
                var state = State.getCurrent();
                var totalQuestions = state.order.length;

                // Calculate category-specific stats
                var categoryAnswered = 0;
                var categoryCorrect = 0;
                for (var i = 0; i < state.order.length; i++) {
                    var qIndex = state.order[i];
                    if (state.answered[qIndex] !== undefined) {
                        categoryAnswered++;
                        if (state.answered[qIndex] === QUESTIONS[qIndex].answer) {
                            categoryCorrect++;
                        }
                    }
                }
                var categoryWrong = categoryAnswered - categoryCorrect;

                // 基于错题本统计当前分类的错题数，与错题本保持一致
                var wrongList = Storage.getWrongList();
                var wrongSet = new Set(wrongList);
                var categoryWrongFromBook = 0;
                for (var i = 0; i < state.order.length; i++) {
                    if (wrongSet.has(state.order[i])) {
                        categoryWrongFromBook++;
                    }
                }

                document.querySelector('#statTotal .stat-value').textContent = categoryAnswered + '/' + totalQuestions;
                document.querySelector('#statCorrect .stat-value').textContent = categoryCorrect;
                document.querySelector('#statWrong .stat-value').textContent = categoryWrongFromBook;

                // Progress bar
                var pct = totalQuestions > 0 ? (categoryAnswered / totalQuestions * 100) : 0;
                document.getElementById('progressBarFill').style.width = pct + '%';

                // Wrong book count badge
                var wrongList = Storage.getWrongList();
                var countEl = document.getElementById('wrongBookCount');
                if (countEl) {
                    countEl.textContent = wrongList.length > 0 ? '(' + wrongList.length + ')' : '';
                }
            },

            renderQuestion(question, qIndex) {
                var state = State.getCurrent();
                var judgeButtons = document.getElementById('judgeButtons');
                var choiceOptions = document.getElementById('choiceOptions');
                var btnSubmit = document.getElementById('btnSubmit');

                // Build question number with type badge
                var typeLabels = {judge: '判断题', single: '单选题', multi: '多选题'};
                var typeBadge = '<span class="question-type-badge type-' + question.type + '">' +
                    (typeLabels[question.type] || '') + '</span>';
                document.getElementById('questionNumber').innerHTML =
                    '第 ' + (state.currentIndex + 1) + ' 题' + typeBadge;
                document.getElementById('questionText').textContent = question.question;

                // Show/hide based on question type
                if (question.type === 'judge') {
                    judgeButtons.style.display = 'flex';
                    choiceOptions.style.display = 'none';
                    btnSubmit.style.display = 'none';
                    this._renderJudgeButtons(question, qIndex);
                } else {
                    judgeButtons.style.display = 'none';
                    choiceOptions.style.display = 'flex';
                    this._renderChoiceOptions(question, qIndex);
                    if (question.type === 'multi' && !State.isAnswered(qIndex)) {
                        btnSubmit.style.display = 'block';
                        btnSubmit.disabled = true;
                    } else {
                        btnSubmit.style.display = 'none';
                    }
                }
            },

            _renderJudgeButtons(question, qIndex) {
                var btnTrue = document.getElementById('btnTrue');
                var btnFalse = document.getElementById('btnFalse');

                btnTrue.className = 'answer-btn btn-true';
                btnFalse.className = 'answer-btn btn-false';

                if (State.isAnswered(qIndex)) {
                    btnTrue.disabled = true;
                    btnFalse.disabled = true;

                    var userAnswer = State.getAnswer(qIndex);
                    if (userAnswer === question.answer) {
                        if (userAnswer === '√') {
                            btnTrue.classList.add('selected-correct');
                        } else {
                            btnFalse.classList.add('selected-correct');
                        }
                    } else {
                        if (userAnswer === '√') {
                            btnTrue.classList.add('selected-wrong');
                        } else {
                            btnFalse.classList.add('selected-wrong');
                        }
                        if (question.answer === '√') {
                            btnTrue.classList.add('correct-answer-highlight');
                        } else {
                            btnFalse.classList.add('correct-answer-highlight');
                        }
                    }
                } else {
                    btnTrue.disabled = false;
                    btnFalse.disabled = false;
                }
            },

            _renderChoiceOptions(question, qIndex) {
                var container = document.getElementById('choiceOptions');
                var answered = State.isAnswered(qIndex);
                var userAnswer = answered ? State.getAnswer(qIndex) : null;
                var html = '';

                for (var i = 0; i < question.options.length; i++) {
                    var opt = question.options[i];
                    var isSelected = false;
                    var isCorrectOption = false;
                    var extraClass = '';

                    if (answered) {
                        // Determine correct options
                        if (question.type === 'single') {
                            isCorrectOption = (opt.label === question.answer);
                        } else {
                            // multi: answer is like "ABC"
                            isCorrectOption = question.answer.indexOf(opt.label) !== -1;
                        }

                        // Determine if user selected this option
                        if (question.type === 'single') {
                            isSelected = (opt.label === userAnswer);
                        } else {
                            isSelected = userAnswer && userAnswer.indexOf(opt.label) !== -1;
                        }

                        if (isCorrectOption) {
                            extraClass = ' correct disabled';
                        } else if (isSelected && !isCorrectOption) {
                            extraClass = ' wrong disabled';
                        } else {
                            extraClass = ' disabled';
                        }
                    }

                    html += '<button class="choice-option' + extraClass + '" data-label="' + opt.label + '">' +
                        '<span class="option-label">' + opt.label + '</span>' +
                        '<span class="option-text">' + opt.text + '</span>' +
                        '</button>';
                }

                container.innerHTML = html;
            },

            renderFeedback(question, userAnswer, isCorrect) {
                var feedbackContainer = document.getElementById('feedbackContainer');
                var feedbackBox = document.getElementById('feedbackBox');
                var feedbackTitle = document.getElementById('feedbackTitle');
                var feedbackExplanation = document.getElementById('feedbackExplanation');

                feedbackContainer.classList.add('visible');
                feedbackBox.className = 'feedback-box';

                if (isCorrect) {
                    feedbackBox.classList.add('feedback-correct');
                    feedbackTitle.textContent = '✓ 回答正确';
                    feedbackExplanation.textContent = question.explanation;
                } else {
                    feedbackBox.classList.add('feedback-wrong');
                    feedbackTitle.textContent = '✗ 回答错误';
                    feedbackExplanation.innerHTML = question.explanation +
                        '<br><button class="redo-btn" style="margin-top:10px;background:var(--primary);color:#fff;' +
                        'border:none;border-radius:var(--radius-sm);padding:8px 18px;font-size:0.88rem;' +
                        'font-weight:600;cursor:pointer;font-family:var(--font-family);">重做本题</button>';
                    feedbackExplanation.querySelector('.redo-btn').addEventListener('click', function() {
                        var qIndex = State.getCurrentQuestionIndex();
                        var state = State.getCurrent();
                        if (state.answered[qIndex] !== undefined) {
                            if (state.answered[qIndex] === question.answer) {
                                state.score--;
                            }
                            state.totalAnswered--;
                            delete state.answered[qIndex];
                        }
                        Storage.saveProgress(state);
                        if (typeof Sync !== 'undefined' && Sync.saveToCloud) Sync.saveToCloud();
                        UI.render();
                        UI.showToast('已清除答题记录，请重新作答', 'info');
                    });
                }
            },

            renderNavigation() {
                document.getElementById('btnPrev').disabled = !State.canGoPrev();
                document.getElementById('btnNext').disabled = !State.canGoNext();
            },

            getSelectedChoices() {
                var selected = [];
                var options = document.querySelectorAll('#choiceOptions .choice-option.selected');
                for (var i = 0; i < options.length; i++) {
                    selected.push(options[i].getAttribute('data-label'));
                }
                return selected.sort().join('');
            },

            showWrongBook() {
                var overlay = document.getElementById('modalOverlay');
                var content = document.getElementById('modalContent');
                var wrongIndices = Storage.getWrongList();

                var html = '<div class="modal-header">' +
                    '<h2 class="modal-title">错题本</h2>' +
                    '<button class="modal-close-btn" id="modalCloseBtn">&times;</button>' +
                    '</div><div class="modal-body">';

                if (wrongIndices.length === 0) {
                    html += '<div class="wrong-book-empty">' +

                        '<div class="empty-text">暂无错题，继续保持！</div>' +
                        '</div>';
                } else {
                    for (var i = 0; i < wrongIndices.length; i++) {
                        var qIndex = wrongIndices[i];
                        var question = QUESTIONS[qIndex];
                        if (!question) continue;

                        var truncated = question.question.length > 40
                            ? question.question.substring(0, 40) + '...'
                            : question.question;

                        var answerDisplay = question.answer;
                        if (question.type === 'judge') {
                            answerDisplay = question.answer === '√' ? '√ 正确' : '× 错误';
                        }

                        var typeLabel = {judge: '判断', single: '单选', multi: '多选'}[question.type] || '';

                        html += '<div class="wrong-book-item" data-question-index="' + qIndex + '">' +
                            '<div class="wb-question">[' + typeLabel + '] ' + truncated + '</div>' +
                            '<div class="wb-meta">' +
                            '<span>正确答案：<span class="wb-answer correct">' + answerDisplay + '</span></span>' +
                            '<button class="btn-redo" data-question-index="' + qIndex + '"' +

                }

                html += '</div>';

                // Bind close button
