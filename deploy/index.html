<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="人工智能训练师三级理论知识刷题系统">
    <title>人工智能训练师三级 - 刷题系统</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>
<body>

    <!-- ==================== App Header ==================== -->
    <header class="app-header">
        <h1 class="header-title">人工智能训练师三级</h1>
        <span class="mode-badge" id="modeBadge">顺序刷题</span>
        <span class="sync-status" id="syncStatus">
            <span class="sync-dot offline"></span>
            <span class="sync-text">离线模式</span>
            <span class="sync-code-display" id="syncCodeDisplay" style="display:none;">
                <span class="sync-code-text" id="syncCodeText"></span>
                <button class="sync-switch-btn" id="syncSwitchBtn">切换</button>
            </span>
        </span>
    </header>

    <!-- ==================== Exam Bar ==================== -->
    <section class="exam-bar" id="examBar" style="display: none;">
        <div class="exam-info">
            <span class="exam-timer" id="examTimer">⏱️ 60:00</span>
            <span class="exam-progress-text" id="examProgressText">已答 0/80</span>
        </div>
        <div class="exam-actions">
            <button class="exam-action-btn submit-btn-exam" id="btnSubmitExam">交卷</button>
            <button class="exam-action-btn exit-btn-exam" id="btnExitExam">退出</button>
        </div>
    </section>

    <!-- ==================== Stats Bar ==================== -->
    <section class="stats-bar" id="statsBar">
        <div class="stat-card" id="statTotal">
            <div class="stat-value">0/44</div>
            <div class="stat-label">总进度</div>
        </div>
        <div class="stat-card correct" id="statCorrect">
            <div class="stat-value">0</div>
            <div class="stat-label">答对</div>
        </div>
        <div class="stat-card wrong" id="statWrong">
            <div class="stat-value">0</div>
            <div class="stat-label">答错</div>
        </div>
    </section>

    <!-- Progress Bar -->
    <div class="progress-wrapper">
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressBarFill"></div>
        </div>
    </div>

    <!-- ==================== Category Tabs ==================== -->
    <div class="category-tabs" id="categoryTabs">
        <button class="cat-tab active" data-category="all">全部</button>
        <button class="cat-tab" data-category="judge">判断题</button>
        <button class="cat-tab" data-category="single">单选题</button>
        <button class="cat-tab" data-category="multi">多选题</button>
        <button class="cat-tab" data-category="wrong">错题重做</button>
        <button class="cat-tab practice-tab" data-category="practice" id="tabPractice">🛠️ 操作技能</button>
        <button class="cat-tab practice-tab" data-category="practice12x" id="tabPractice12x">📝 方案设计</button>
    </div>

    <!-- ==================== Question Container ==================== -->
    <main class="question-container" id="questionContainer">
        <div class="question-card" id="questionCard">
            <span class="question-number" id="questionNumber">第 1 题</span>
            <p class="question-text" id="questionText">加载中...</p>
            <div class="answer-area" id="answerArea">
                <!-- Judge buttons (shown for judge type) -->
                <div class="answer-buttons judge-buttons" id="judgeButtons">
                    <button class="answer-btn btn-true" id="btnTrue" data-answer="√">
                        <span>√</span>
                        <span>正确</span>
                    </button>
                    <button class="answer-btn btn-false" id="btnFalse" data-answer="×">
                        <span>×</span>
                        <span>错误</span>
                    </button>
                </div>
                <!-- Choice options (shown for single/multi type) -->
                <div class="choice-options" id="choiceOptions"></div>
                <!-- Submit button for multi-choice -->
                <button class="submit-btn" id="btnSubmit" style="display:none">提交答案</button>
            </div>
        </div>
    </main>

    <!-- ==================== Practice Container ==================== -->
    <main class="practice-container" id="practiceContainer" style="display: none;">
        <!-- Content will be dynamically injected by JS -->
    </main>

    <!-- ==================== Practice 1.2.x Container ==================== -->
    <main class="practice-container" id="practice12xContainer" style="display: none;">
        <!-- Content will be dynamically injected by JS -->
    </main>

    <!-- ==================== Feedback Container ==================== -->
    <section class="feedback-container" id="feedbackContainer">
        <div class="feedback-box" id="feedbackBox">
            <div class="feedback-title" id="feedbackTitle"></div>
            <div class="feedback-explanation" id="feedbackExplanation"></div>
        </div>
    </section>

    <!-- ==================== Navigation Bar ==================== -->
    <nav class="navigation-bar" id="navigationBar">
        <button class="nav-btn" id="btnPrev" disabled>
            <span>←</span>
            <span>上一题</span>
        </button>
        <button class="nav-btn primary-btn" id="btnNext">
            <span>下一题</span>
            <span>→</span>
        </button>
    </nav>

    <!-- ==================== Bottom Bar ==================== -->
    <div class="bottom-bar" id="bottomBar">
        <button class="bottom-btn" id="btnWrongBook">
            <span class="btn-icon">📕</span>
            <span>错题本</span>
            <span id="wrongBookCount"></span>
        </button>
        <button class="bottom-btn" id="btnQuestionList">
            <span class="btn-icon">📋</span>
            <span>目录</span>
        </button>
        <button class="bottom-btn" id="btnModeSwitch">
            <span class="btn-icon">🔄</span>
            <span>切换模式</span>
        </button>
        <button class="bottom-btn" id="btnReset">
            <span class="btn-icon">🗑️</span>
            <span>重置</span>
        </button>
    </div>

    <!-- ==================== Modal Overlay ==================== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content" id="modalContent">
            <!-- Modal content will be dynamically injected -->
        </div>
    </div>

    <!-- ==================== Toast Container ==================== -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
