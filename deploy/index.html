                    UI.hideWrongBook();
                });
            },

            hideWrongBook() {
                document.getElementById('modalOverlay').classList.remove('visible');
            },

            showCompletion() {
                var overlay = document.getElementById('modalOverlay');
                var content = document.getElementById('modalContent');
                var state = State.getCurrent();

                // Calculate category-specific stats
                var total = state.order.length;
                var score = 0;
                for (var i = 0; i < state.order.length; i++) {
                    var qIndex = state.order[i];
                    if (state.answered[qIndex] !== undefined && state.answered[qIndex] === QUESTIONS[qIndex].answer) {
                        score++;
                    }
                }
                var wrongCount = total - score;
                var accuracy = total > 0 ? Math.round(score / total * 100) : 0;

                var icon = accuracy >= 80 ? '🎉' : (accuracy >= 60 ? '👍' : '💪');

                var html = '<div class="modal-header">' +
                    '<h2 class="modal-title">练习完成</h2>' +
                    '<button class="modal-close-btn" id="modalCloseCompletionBtn">&times;</button>' +
                    '</div><div class="modal-body">' +
                    '<div class="completion-summary">' +
                    '<div class="summary-icon">' + icon + '</div>' +
                    '<div class="summary-title">练习完成！</div>' +
                    '<div class="summary-subtitle">你已完成当前分类下所有 ' + total + ' 道题目</div>' +
                    '<div class="summary-accuracy">' + accuracy + '%</div>' +
                    '<div class="summary-accuracy-label">正确率</div>' +
                    '<div class="summary-stats">' +
                    '<div class="summary-stat-item correct"><div class="summary-stat-value">' + score + '</div><div class="summary-stat-label">答对</div></div>' +
                    '<div class="summary-stat-item wrong"><div class="summary-stat-value">' + wrongCount + '</div><div class="summary-stat-label">答错</div></div>' +
                    '<div class="summary-stat-item total"><div class="summary-stat-value">' + total + '</div><div class="summary-stat-label">已答</div></div>' +
                    '</div>' +
                    '<div class="completion-btn-group">' +
                    '<button class="completion-btn btn-retry" id="btnRetry">重新开始</button>' +
                    '<button class="completion-btn btn-wrong-book" id="btnCompletionWrongBook">查看错题本</button>' +
                    '</div></div></div>';

                content.innerHTML = html;
                overlay.classList.add('visible');

                // Bind buttons
                document.getElementById('modalCloseCompletionBtn').addEventListener('click', function() {
                    UI.hideCompletion();
                });
                document.getElementById('btnRetry').addEventListener('click', function() {
                    UI.hideCompletion();
                    State.reset();
                    UI.render();
                    UI.showToast('已重新开始', 'success');
                });
                document.getElementById('btnCompletionWrongBook').addEventListener('click', function() {
                    UI.hideCompletion();
                    UI.showWrongBook();
                });
            },

            hideCompletion() {
                document.getElementById('modalOverlay').classList.remove('visible');
            },

            showToast(message, type) {
                var container = document.getElementById('toastContainer');
                var toast = document.createElement('div');
                toast.className = 'toast';

                if (type === 'success') {
                    toast.style.background = 'rgba(82, 196, 26, 0.9)';
                } else if (type === 'error') {
                    toast.style.background = 'rgba(255, 77, 79, 0.9)';
                } else if (type === 'info') {
                    toast.style.background = 'rgba(74, 144, 217, 0.9)';
                }

                toast.textContent = message;
                container.appendChild(toast);

                setTimeout(function() {
                    if (toast.parentNode) {
                        toast.parentNode.removeChild(toast);
                    }
                }, 3000);
            },

            showQuestionList() {
                var overlay = document.getElementById('modalOverlay');
                var content = document.getElementById('modalContent');
                var state = State.getCurrent();
                var currentCategory = State.getCategory();
                var currentQIndex = State.getCurrentQuestionIndex();

                // Category labels
                var categoryLabels = {
                    all: '全部',
                    judge: '判断题',
                    single: '单选题',
                    multi: '多选题'
                };

                // Build modal HTML
                var html = '<div class="modal-header">' +
                    '<h2 class="modal-title">题目目录</h2>' +
                    '<button class="modal-close-btn" id="questionListCloseBtn">&times;</button>' +
                    '</div><div class="modal-body">';

                // Category tabs
                html += '<div class="question-list-tabs">';
                var categories = ['all', 'judge', 'single', 'multi'];
                for (var i = 0; i < categories.length; i++) {
                    var cat = categories[i];
                    var activeClass = cat === currentCategory ? ' active' : '';
                    html += '<button class="question-list-tab' + activeClass + '" data-category="' + cat + '">' +
                        categoryLabels[cat] + '</button>';
                }
                html += '</div>';

                // Question count
                html += '<div class="question-list-header">' +
                    '<span class="question-list-count">共 ' + state.order.length + ' 题</span>' +
                    '</div>';

                // Question grid
                html += '<div class="question-grid" id="questionGrid">';

                for (var i = 0; i < state.order.length; i++) {
                    var qIndex = state.order[i];
                    var question = QUESTIONS[qIndex];
                    if (!question) continue;

                    var itemClass = 'question-grid-item';
                    var statusIcon = '';

                    // Check if current question
                    if (qIndex === currentQIndex) {
                        itemClass += ' current';
                    }

                    // Check if answered
                    if (state.answered[qIndex] !== undefined) {
                        var isCorrect = state.answered[qIndex] === question.answer;
                        if (isCorrect) {
                            itemClass += ' correct';
                            statusIcon = '<span class="item-status">✓</span>';
                        } else {
                            itemClass += ' wrong';
                            statusIcon = '<span class="item-status">✗</span>';
                        }
                    }

                    html += '<div class="' + itemClass + '" data-question-index="' + qIndex + '">' +
                        (i + 1) + statusIcon + '</div>';
                }

                html += '</div></div>';

                content.innerHTML = html;
                overlay.classList.add('visible');

                // Bind close button
                document.getElementById('questionListCloseBtn').addEventListener('click', function() {
                    overlay.classList.remove('visible');
                });

                // Bind category tabs
                var tabs = content.querySelectorAll('.question-list-tab');
                for (var i = 0; i < tabs.length; i++) {
                    tabs[i].addEventListener('click', function() {
                        var newCategory = this.getAttribute('data-category');
                        State.setCategory(newCategory);
                        UI.render();
                        UI.showQuestionList();
                    });
                }

                // Bind question grid items
                var gridItems = content.querySelectorAll('.question-grid-item');
                for (var i = 0; i < gridItems.length; i++) {
                    gridItems[i].addEventListener('click', function() {
                        var targetIndex = parseInt(this.getAttribute('data-question-index'));
                        var position = state.order.indexOf(targetIndex);
                        if (position !== -1) {
                            state.currentIndex = position;
                            Storage.saveProgress(state);
                            if (typeof Sync !== 'undefined' && Sync.saveToCloud) Sync.saveToCloud();
                            overlay.classList.remove('visible');
                            UI.render();
                        }
                    });
                }
            }
        };
    })();

    /* ------- Events Module (Task 3) ------- */
    const Events = (function() {
        function toggleMultiChoice(label) {
            var question = State.getCurrentQuestion();
            var qIndex = State.getCurrentQuestionIndex();
            if (!question || State.isAnswered(qIndex)) return;

            var option = document.querySelector('#choiceOptions .choice-option[data-label="' + label + '"]');
            if (!option) return;

            option.classList.toggle('selected');
            var selected = document.querySelectorAll('#choiceOptions .choice-option.selected');
            document.getElementById('btnSubmit').disabled = selected.length === 0;
        }

        function handleAnswer(userAnswer) {
            var question = State.getCurrentQuestion();
            var qIndex = State.getCurrentQuestionIndex();
            if (State.isAnswered(qIndex)) return;

            var isCorrect = State.answerQuestion(userAnswer);
            UI.render();

            if (isCorrect) {
                UI.showToast('回答正确！', 'success');
            } else {
                UI.showToast('回答错误', 'error');
            }

            // Check if all filtered questions answered - show completion
            var state = State.getCurrent();
            var categoryAnsweredCount = 0;
            for (var i = 0; i < state.order.length; i++) {
                if (state.answered[state.order[i]] !== undefined) {
                    categoryAnsweredCount++;
                }
            }
            if (categoryAnsweredCount >= state.order.length) {
                setTimeout(function() {
                    UI.showCompletion();
                }, 600);
            }
        }

        function updateModeBadge() {
            var state = State.getCurrent();
            document.getElementById('modeBadge').textContent =
                state.mode === 'sequential' ? '顺序刷题' : '随机刷题';
        }

        return {
            init() {
                // Judge answer buttons
                document.getElementById('btnTrue').addEventListener('click', function() {
                    handleAnswer('√');
                });
                document.getElementById('btnFalse').addEventListener('click', function() {
                    handleAnswer('×');
                });

                // Category tab clicks (event delegation)
                document.getElementById('categoryTabs').addEventListener('click', function(e) {
                    var target = e.target;
                    if (target.classList.contains('cat-tab')) {
                        var cat = target.getAttribute('data-category');
                        State.setCategory(cat);
                        UI.render();
                    }
                });

                // Choice options (event delegation on choiceOptions container)
                document.getElementById('choiceOptions').addEventListener('click', function(e) {
                    var option = e.target.closest('.choice-option');
                    if (!option || option.classList.contains('disabled')) return;

                    var question = State.getCurrentQuestion();
                    var qIndex = State.getCurrentQuestionIndex();
                    if (!question || State.isAnswered(qIndex)) return;

                    if (question.type === 'single') {
                        // Single choice: immediately submit
                        var label = option.getAttribute('data-label');
                        handleAnswer(label);
                    } else if (question.type === 'multi') {
                        // Multi choice: toggle selection
                        option.classList.toggle('selected');
                        // Enable/disable submit button based on selection
                        var selected = document.querySelectorAll('#choiceOptions .choice-option.selected');
                        document.getElementById('btnSubmit').disabled = selected.length === 0;
                    }
                });

                // Submit button for multi-choice
                document.getElementById('btnSubmit').addEventListener('click', function() {
                    var question = State.getCurrentQuestion();
                    var qIndex = State.getCurrentQuestionIndex();
                    if (!question || State.isAnswered(qIndex)) return;

                    var selected = document.querySelectorAll('#choiceOptions .choice-option.selected');
                    if (selected.length === 0) return;

                    var answer = '';
                    for (var i = 0; i < selected.length; i++) {
                        answer += selected[i].getAttribute('data-label');
                    }
                    // Sort alphabetically to match expected answer format
                    answer = answer.split('').sort().join('');
                    handleAnswer(answer);
                });

                // Navigation: previous
                document.getElementById('btnPrev').addEventListener('click', function() {
                    State.goPrev();
                    UI.render();
                });

                // Navigation: next
                document.getElementById('btnNext').addEventListener('click', function() {
                    State.goNext();
                    UI.render();
                });

                // Bottom bar: wrong book
                document.getElementById('btnWrongBook').addEventListener('click', function() {
                    UI.showWrongBook();
                });

                // Modal overlay click to close
                document.getElementById('modalOverlay').addEventListener('click', function(e) {
                    if (e.target === this) {
                        UI.hideWrongBook();
                        UI.hideCompletion();
                    }
                });

                // Event delegation for wrong book "重做" buttons
                document.getElementById('modalContent').addEventListener('click', function(e) {
                    var target = e.target;
                    if (target.classList.contains('btn-redo')) {
                        var qIndex = parseInt(target.getAttribute('data-question-index'), 10);
                        var state = State.getCurrent();
                        var orderIndex = state.order.indexOf(qIndex);
                        if (orderIndex !== -1) {
                            state.currentIndex = orderIndex;
                            // 清除该题的答题记录，允许重新作答
                            if (state.answered[qIndex] !== undefined) {
                                if (state.answered[qIndex] === QUESTIONS[qIndex].answer) {
                                    state.score--;
                                }
                                state.totalAnswered--;
                                delete state.answered[qIndex];
                            }
                            Storage.saveProgress(state);
                            if (typeof Sync !== 'undefined' && Sync.saveToCloud) Sync.saveToCloud();
                        }
                        UI.hideWrongBook();
                        UI.render();
                        UI.showToast('已清除答题记录，请重新作答', 'info');
                    }
                });

                // Keyboard shortcuts
                document.addEventListener('keydown', function(e) {
                    var modalOverlay = document.getElementById('modalOverlay');

                    // Escape key closes any open modal
                    if (e.key === 'Escape') {
                        if (modalOverlay.classList.contains('visible')) {
                            e.preventDefault();
                            UI.hideWrongBook();
                            UI.hideCompletion();
                        }
                        return;
                    }

                    // Ignore other keys when modal is open
                    if (modalOverlay.classList.contains('visible')) return;

                    if (e.key === 'ArrowLeft') {
                        e.preventDefault();
                        if (State.canGoPrev()) {
                            State.goPrev();
                            UI.render();
                        }
                    } else if (e.key === 'ArrowRight') {
                        e.preventDefault();
                        if (State.canGoNext()) {
                            State.goNext();
                            UI.render();
                        }
                    } else if (e.key === '1') {
                        var q = State.getCurrentQuestion();
                        if (q && q.type === 'judge') {
                            handleAnswer('√');
                        } else if (q && q.type === 'single') {
                            handleAnswer('A');
                        } else if (q && q.type === 'multi') {
                            toggleMultiChoice('A');
                        }
                    } else if (e.key === '2') {
                        var q2 = State.getCurrentQuestion();
                        if (q2 && q2.type === 'judge') {
                            handleAnswer('×');
                        } else if (q2 && q2.type === 'single') {
                            handleAnswer('B');
                        } else if (q2 && q2.type === 'multi') {
                            toggleMultiChoice('B');
                        }
                    } else if (e.key === '3') {
                        var q3 = State.getCurrentQuestion();
                        if (q3 && q3.type === 'single') {
                            handleAnswer('C');
                        } else if (q3 && q3.type === 'multi') {
                            toggleMultiChoice('C');
                        }
                    } else if (e.key === '4') {
                        var q4 = State.getCurrentQuestion();
                        if (q4 && q4.type === 'single') {
                            handleAnswer('D');
                        } else if (q4 && q4.type === 'multi') {
                            toggleMultiChoice('D');
                        }
                    }
                });

                // Initial mode badge
                updateModeBadge();
            }
        };
    })();

    /* ------- App Module (Task 4) ------- */
    const App = (function() {
        // --- Confirm Modal ---
        function showConfirm(icon, message, onConfirm) {
            var overlay = document.getElementById('modalOverlay');
            var content = document.getElementById('modalContent');

            var html = '<div class="modal-header">' +
                '<h2 class="modal-title">确认操作</h2>' +
                '<button class="modal-close-btn" id="confirmCloseBtn">&times;</button>' +
                '</div>' +
                '<div class="confirm-body">' +
                '<div class="confirm-icon">' + icon + '</div>' +
                '<div class="confirm-message">' + message + '</div>' +
                '<div class="confirm-btn-group">' +
                '<button class="confirm-btn confirm-btn-cancel" id="confirmCancelBtn">取消</button>' +
                '<button class="confirm-btn confirm-btn-confirm" id="confirmOkBtn">确定</button>' +
                '</div></div>';

            content.innerHTML = html;
            overlay.classList.add('visible');

            function hideConfirm() {
                overlay.classList.remove('visible');
            }

            document.getElementById('confirmCloseBtn').addEventListener('click', hideConfirm);
            document.getElementById('confirmCancelBtn').addEventListener('click', hideConfirm);
            document.getElementById('confirmOkBtn').addEventListener('click', function() {
                hideConfirm();
                onConfirm();
            });
        }

        // --- Reset Handler ---
        function bindResetButton() {
            document.getElementById('btnReset').addEventListener('click', function() {
                showConfirm('⚠️', '确定要重置所有进度吗？此操作不可撤销。', function() {
                    State.reset();
                    UI.render();
                    UI.showToast('已重置所有进度', 'success');
                });
            });
        }

        // --- Mode Switch Confirmation ---
        function bindModeSwitchConfirmation() {
            var modeBtn = document.getElementById('btnModeSwitch');
            // Remove the existing event listeners by cloning the node
            var newModeBtn = modeBtn.cloneNode(true);
            modeBtn.parentNode.replaceChild(newModeBtn, modeBtn);

            newModeBtn.addEventListener('click', function() {
                var state = State.getCurrent();
                var newMode = (state.mode === 'sequential') ? 'random' : 'sequential';

                showConfirm('🔄', '切换模式将重置当前进度，是否继续？', function() {
                    State.reset();
                    State.setMode(newMode);
                    UI.render();
                    var badge = document.getElementById('modeBadge');
                    badge.textContent = newMode === 'sequential' ? '顺序刷题' : '随机刷题';
                    UI.showToast(
                        newMode === 'sequential' ? '已切换为顺序模式' : '已切换为随机模式',
                        'info'
                    );
                });
            });
        }

        // --- Question List Button ---
        function bindQuestionListButton() {
            document.getElementById('btnQuestionList').addEventListener('click', function() {
                UI.showQuestionList();
            });
        }

        // --- Init ---
        async function init() {
            await loadQuestions();
            State.init();
            if (typeof Sync !== 'undefined') {
                try { Sync.init(); } catch (e) { /* ignore */ }
            }
            UI.render();
            Events.init();
            bindResetButton();
            bindModeSwitchConfirmation();
            bindQuestionListButton();

            // Pull latest from Firebase when tab becomes visible
            document.addEventListener('visibilitychange', function() {
                if (document.visibilityState === 'visible' && typeof Sync !== 'undefined') {
                    try { Sync.loadFromCloud(); } catch (e) { /* ignore */ }
                }
            });
        }

        return { init: init };
    })();

    document.addEventListener('DOMContentLoaded', function() {
        App.init();
    });


    </script>
</body>
</html>
